version: '3.9'

services:
  apigintask:
    container_name: apigintask
    image: apigintask/1.0
    build: .
    ports:
      - "8080:8080"
      - "3000:3000"
    environment:
      ConnectionStrings__DefaultConnection: "Host=dbapigintask;Database=postgres;Username=postgres;Password=postgres"
    depends_on:
      dbapigintask:
        condition: service_healthy
    x-develop:
      watch:
        - action: rebuild
          path: .       
  dbapigintask:
    container_name: dbapigintask
    image: postgres:12
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdatadbapigintask:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5  

volumes:
  pgdatadbapigintask: {}